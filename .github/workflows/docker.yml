name: Auto Build & Push Docker

on:
  push:
    branches:
      - main   # push vào main sẽ chạy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ducdz2903/sensorx-gateway:latest .

      - name: Push image
        run: |
          docker push ducdz2903/sensorx-gateway:latest
